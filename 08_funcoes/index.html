<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>08 - Funcoes</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <h1>Funcoes</h1>

    <div class="grupo">
      <button id="btn-sem-parametro">Funcao sem parametro</button>
    </div>

    <div class="grupo">
      <input id="nome" type="text" placeholder="Digite um nome">
      <button id="btn-com-parametro">Funcao com parametro</button>

      <input id="numero-a" type="number" value="2">

    </div>

    <pre id="saida"></pre>
  </main>

  <script src="script.js"></script>
