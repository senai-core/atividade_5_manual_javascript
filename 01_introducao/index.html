<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>01 - Introducao ao JavaScript</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <h1>Introducao ao JavaScript</h1>
    <p class="explicacao">
      HTML monta a pagina, CSS cuida do visual e JavaScript faz a tela reagir.
    </p>

    <section class="card">
      <h2 id="titulo-status">Pagina parada</h2>
      <p id="texto-status">
        Clica no botao pra ver o JavaScript mudando o conteudo da pagina.
      </p>
      <button id="botao-intro">Mostrar acao do JavaScript</button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
